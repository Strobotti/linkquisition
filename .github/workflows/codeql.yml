name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev
          version: 1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Build
        run: |
          # Build main binary and internal packages (exclude plugins — they require -buildmode=plugin)
          go build -tags x11 $(go list ./... | grep -v '/plugins/')

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

name: macOS PR check

on:
  pull_request:

jobs:
  build:
    name: build macOS app
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build:darwin-arm64

      - name: Test
        run: go test ./...

      - name: Package
        run: task package:app

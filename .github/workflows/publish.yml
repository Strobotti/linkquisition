name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev
          version: 1.0

      - uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: task test

  build:
    name: Build (${{ matrix.target }})
    needs: [ test ]
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            artifact: linkquisition-linux-amd64
          - target: darwin-universal
            os: macos-latest
            artifact: Linkquisition_macOS_universal.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Install Linux build dependencies (cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev scdoc
          version: 1.0

      - uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build:${{ matrix.target }}
        env:
          VERSION: ${{ github.ref_name }}

      - name: Package Linux .deb
        if: matrix.target == 'linux-amd64'
        run: |
          task package:linux
          task build:plugins
          mkdir -p dist
          mkdir -p package/linux/DEBIAN package/linux/usr/bin package/linux/usr/lib/linkquisition/plugins
          cp bin/linkquisition-linux-amd64 package/linux/usr/bin/linkquisition
          cp package/linux/usr/lib/linkquisition/plugins/*.so package/linux/usr/lib/linkquisition/plugins/ 2>/dev/null || true
          cp templates/DEBIAN/control.tpl package/linux/DEBIAN/control
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/{{VERSION}}/${VERSION}/g" package/linux/DEBIAN/control
          sed -i "s/{{ARCH}}/amd64/g" package/linux/DEBIAN/control
          dpkg-deb --build package/linux dist/linkquisition_${VERSION}_amd64.deb
        env:
          VERSION: ${{ github.ref_name }}

      - name: Build AppImage
        if: matrix.target == 'linux-amd64'
        run: |
          task package:manpages
          ./scripts/build-appimage.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Package macOS .app
        if: matrix.target == 'darwin-universal'
        run: |
          task package:app
          codesign --force --deep --sign - dist/Linkquisition.app
          cd dist && ditto -c -k --keepParent Linkquisition.app Linkquisition_macOS_universal.zip
        env:
          VERSION: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/

  upload-assets:
    name: Upload Release Assets
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev scdoc
          version: 1.0

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package files for Linux
        run: task package:linux

      - name: Run GoReleaser (build only)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: darwin-universal
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-amd64
          path: artifacts/

      - name: Upload all assets to release
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          echo "=== Contents of dist/ ==="
          ls -la dist/

          # Upload GoReleaser outputs individually so one missing glob doesn't block others
          for pattern in "dist/*.deb" "dist/*.rpm" "dist/*.tar.gz"; do
            files=$(ls $pattern 2>/dev/null)
            if [ -n "$files" ]; then
              echo "Uploading: $files"
              gh release upload "$TAG" $files --clobber
            else
              echo "Warning: no files matching $pattern"
            fi
          done

          # Checksums (filename may vary)
          if ls dist/checksums* 1>/dev/null 2>&1; then
            gh release upload "$TAG" dist/checksums* --clobber
          fi

          # SBOMs (may or may not exist)
          if ls dist/*.sbom* 1>/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.sbom* --clobber
          fi

          # macOS universal binary
          echo "Uploading macOS artifact"
          gh release upload "$TAG" artifacts/Linkquisition_macOS_universal.zip --clobber

          # AppImage
          echo "Uploading AppImage"
          gh release upload "$TAG" artifacts/Linkquisition-*.AppImage --clobber

  update-homebrew:
    name: Update Homebrew Tap
    needs: [ upload-assets ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: darwin-universal
          path: artifacts/

      - name: Update Homebrew Cask
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SHA256=$(sha256sum artifacts/Linkquisition_macOS_universal.zip | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/Strobotti/homebrew-tap.git tap
          cd tap

          mkdir -p Casks
          sed -e "s/\${VERSION}/${VERSION}/g" \
              -e "s/\${SHA256}/${SHA256}/g" \
              ../homebrew/Casks/linkquisition.rb > Casks/linkquisition.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/linkquisition.rb
          git commit -m "Update linkquisition to v${VERSION}" || echo "No changes to commit"
          git push

name: Release

on:
  push:
    branches: [ main ]

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release: ${{ steps.semrel.outputs.version != '' }}
      version: ${{ steps.semrel.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: go-semantic-release/action@v1
        id: semrel
        with:
          github-token: ${{ secrets.DEPENDABOT_TOKEN }}
          dry: true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev
          version: 1.0

      - uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: task test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: test/coverage.latest/coverage.xml

  build:
    name: Build (${{ matrix.target }})
    needs: [ version, test ]
    if: needs.version.outputs.new_release == 'true'
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            artifact: linkquisition-linux-amd64
          - target: darwin-universal
            os: macos-latest
            artifact: Linkquisition_macOS_universal.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Linux build dependencies (cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev scdoc
          version: 1.0

      - uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build:${{ matrix.target }}
        env:
          VERSION: v${{ needs.version.outputs.version }}

      - name: Package Linux .deb
        if: matrix.target == 'linux-amd64'
        run: |
          task package:linux
          task build:plugins
          mkdir -p dist
          mkdir -p package/linux/DEBIAN package/linux/usr/bin package/linux/usr/lib/linkquisition/plugins
          cp bin/linkquisition-linux-amd64 package/linux/usr/bin/linkquisition
          cp package/linux/usr/lib/linkquisition/plugins/*.so package/linux/usr/lib/linkquisition/plugins/ 2>/dev/null || true
          cp templates/DEBIAN/control.tpl package/linux/DEBIAN/control
          sed -i "s/{{VERSION}}/${{ needs.version.outputs.version }}/g" package/linux/DEBIAN/control
          sed -i "s/{{ARCH}}/amd64/g" package/linux/DEBIAN/control
          dpkg-deb --build package/linux dist/linkquisition_${{ needs.version.outputs.version }}_amd64.deb
        env:
          VERSION: v${{ needs.version.outputs.version }}

      - name: Build AppImage
        if: matrix.target == 'linux-amd64'
        run: |
          task package:manpages
          ./scripts/build-appimage.sh
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Package macOS .app
        if: matrix.target == 'darwin-universal'
        run: |
          task package:app
          codesign --force --deep --sign - dist/Linkquisition.app
          cd dist && ditto -c -k --keepParent Linkquisition.app Linkquisition_macOS_universal.zip
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: [ version, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev scdoc
          version: 1.0

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package files for Linux
        run: task package:linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: darwin-universal
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-amd64
          path: artifacts/

      - uses: go-semantic-release/action@v1
        id: semrel
        with:
          github-token: ${{ secrets.DEPENDABOT_TOKEN }}
          hooks: goreleaser
          allow-initial-development-versions: true
        env:
          GITHUB_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}

      - name: Upload macOS asset to release
        if: steps.semrel.outputs.version != ''
        run: gh release upload "v${{ steps.semrel.outputs.version }}" artifacts/Linkquisition_macOS_universal.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}

      - name: Upload AppImage to release
        if: steps.semrel.outputs.version != ''
        run: gh release upload "v${{ steps.semrel.outputs.version }}" artifacts/Linkquisition-*.AppImage --clobber
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [ version, release ]
    if: needs.version.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: darwin-universal
          path: artifacts/

      - name: Update Homebrew Cask
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          SHA256=$(sha256sum artifacts/Linkquisition_macOS_universal.zip | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/Strobotti/homebrew-tap.git tap
          cd tap

          mkdir -p Casks
          sed -e "s/\${VERSION}/${VERSION}/g" \
              -e "s/\${SHA256}/${SHA256}/g" \
              ../homebrew/Casks/linkquisition.rb > Casks/linkquisition.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/linkquisition.rb
          git commit -m "Update linkquisition to v${VERSION}" || echo "No changes to commit"
          git push

  update-metainfo:
    name: Update Flatpak Metainfo
    needs: [ version, release ]
    if: needs.version.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Update metainfo and create PR
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="chore/release-metadata-v${VERSION}"
          METAINFO="flatpak/io.github.strobotti.linkquisition.metainfo.xml"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          # Insert a new <release> entry after the <releases> tag
          sed -i "s|<releases>|<releases>\n    <release version=\"${VERSION}\" date=\"${DATE}\">\n      <description>\n        <p>See https://github.com/Strobotti/linkquisition/releases/tag/v${VERSION} for details.</p>\n      </description>\n    </release>|" "$METAINFO"

          git add "$METAINFO"
          git commit -m "chore: update Flatpak metainfo for v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: update Flatpak metainfo for v${VERSION}" \
            --body "Automated update of the Flatpak metainfo release entry for v${VERSION}." \
            --base main \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --auto --squash

  coverage:
    name: Coverage Badge
    needs: [ test ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v7

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: test/coverage.latest/

      - name: Make Coverage Badge
        uses: action-badges/cobertura-coverage-xml-badges@0.4.1
        with:
          file-name: coverage.svg
          badge-branch: gh-pages
          coverage-file-name: test/coverage.latest/coverage.xml
          github-token: ${{ secrets.GITHUB_TOKEN }}

name: pull-request
on:
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev
          version: 1.0
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev
          version: 1.0

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: task test

  build:
    name: build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
          - target: darwin-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Linux build dependencies (cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev
          version: 1.0

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build application
        run: task build:${{ matrix.target }}

      - name: Build plugins
        if: matrix.target == 'linux-amd64'
        run: task build:plugins

      - name: Build .app bundle
        if: matrix.target == 'darwin-arm64'
        run: task package:app

name: pull-request
on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'

      - name: Install build dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev
          version: 1.0

      - name: Generate Wayland protocol headers
        run: ./scripts/generate-wayland-protocols.sh

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: task test

  build:
    name: build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
          - target: darwin-arm64
            os: macos-latest
          - target: windows-amd64
            os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'

      - name: Disable Windows Defender real-time scanning
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Install Linux build dependencies (cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev
          version: 1.0

      - name: Generate Wayland protocol headers
        if: runner.os == 'Linux'
        run: ./scripts/generate-wayland-protocols.sh

      - uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build application
        run: task build:${{ matrix.target }}

      - name: Run tests (Windows)
        if: matrix.target == 'windows-amd64'
        run: go test ./...

      - name: Build plugins
        if: matrix.target == 'linux-amd64'
        run: task build:plugins

      - name: Build .app bundle
        if: matrix.target == 'darwin-arm64'
        run: task package:app

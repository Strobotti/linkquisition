version: '3'

tasks:
  default:
    cmds:
      - task: linux-amd64

  binary:
    internal: true
    vars:
      OUTPUT: '{{default "linkquisition" .OUTPUT}}'
      TARGET: '{{default "linux" .TARGET}}'
      VERSION:
        sh: echo ${VERSION:-v0.0.0}
      OPTIONS: '{{default "" .DEVOPTIONS}}'
    cmds:
      - CGO_ENABLED=1 GOOS={{.TARGET}} go build -tags release -ldflags '-s -w -X main.version={{.VERSION}} -X main.BuildTimestamp={{now | unixEpoch}}' {{.OPTIONS}} -o bin/{{.OUTPUT}}{{exeExt}} ./cmd/
      - echo "bin/{{.OUTPUT}}{{exeExt}} created successfully"
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - bin/{{.OUTPUT}}{{exeExt}}

  linux-amd64:
    cmds:
      - task: binary
        vars:
          OUTPUT: "linkquisition-linux-amd64"
          TARGET: "linux"

  darwin-arm64:
    cmds:
      - task: binary
        vars:
          OUTPUT: "linkquisition-darwin-arm64"
          TARGET: "darwin"

  darwin-amd64:
    cmds:
      - task: binary
        vars:
          OUTPUT: "linkquisition-darwin-amd64"
          TARGET: "darwin"

  plugins:
    cmds:
      - task: build-plugins
        vars:
          OUTPUT_DIR: "package/linux/usr/lib/linkquisition/plugins"

  plugins-darwin:
    cmds:
      - task: build-plugins
        vars:
          OUTPUT_DIR: "dist/Linkquisition.app/Contents/Resources/plugins"

  build-plugins:
    internal: true
    vars:
      PLUGINS: "unwrap terminus sanitize"
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}
      - for: { var: PLUGINS }
        cmd: go build -buildmode=plugin -o {{.OUTPUT_DIR}}/{{.ITEM}}.so ./plugins/{{.ITEM}}/{{.ITEM}}.go

  clean:
    cmds:
      - rm -rf bin/*

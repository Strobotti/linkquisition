version: '3'

vars:
  VERSION:
    sh: echo ${VERSION:-0.0.0}

tasks:
  clean:
    cmds:
      - rm -rfv dist package/linux

  manpages:
    description: "Builds man pages from scdoc sources"
    cmds:
      - mkdir -p package/linux/usr/share/man/man1 package/linux/usr/share/man/man5
      - scdoc < doc/linkquisition.1.scd > package/linux/usr/share/man/man1/linkquisition.1
      - scdoc < doc/linkquisition.5.scd > package/linux/usr/share/man/man5/linkquisition.5

  linux:
    cmds:
      - mkdir -p package/linux/usr/share/applications package/linux/usr/share/pixmaps
      - cp Icon.png package/linux/usr/share/pixmaps/linkquisition.png
      - cp templates/linkquisition.desktop package/linux/usr/share/applications/linkquisition.desktop
      - task: manpages

  deb:
    description: "Builds a Debian package for local testing"
    cmds:
      - task build
      - task build:plugins
      - task package:linux
      - mkdir -p dist
      - mkdir -p package/linux/DEBIAN package/linux/usr/bin
      - cp bin/linkquisition-linux-amd64 package/linux/usr/bin/linkquisition
      - cp templates/DEBIAN/control.tpl package/linux/DEBIAN/control
      - sed -i 's/{{ "{{" }}VERSION{{ "}}" }}/{{.VERSION}}/g' package/linux/DEBIAN/control
      - sed -i 's/{{ "{{" }}ARCH{{ "}}" }}/amd64/g' package/linux/DEBIAN/control
      - dpkg-deb --build package/linux dist/linkquisition_{{.VERSION}}_linux_amd64.deb

  app:
    description: "Builds a macOS .app bundle with a universal binary (arm64 + amd64)"
    cmds:
      - task build:darwin-universal
      - rm -rf dist/Linkquisition.app
      - mkdir -p dist/Linkquisition.app/Contents/MacOS
      - mkdir -p dist/Linkquisition.app/Contents/Resources
      - cp bin/linkquisition-darwin-universal dist/Linkquisition.app/Contents/MacOS/linkquisition
      - task build:plugins-darwin
      - sed 's/${VERSION}/{{.VERSION}}/g' package/darwin/Info.plist > dist/Linkquisition.app/Contents/Info.plist
      - sips -s format icns Icon.png --out dist/Linkquisition.app/Contents/Resources/Icon.icns 2>/dev/null || cp Icon.png dist/Linkquisition.app/Contents/Resources/Icon.icns
      - echo "dist/Linkquisition.app created successfully"

  app:install:
    description: "Builds the .app bundle and installs it to /Applications"
    cmds:
      - task package:app
      - cp -r dist/Linkquisition.app /Applications/
      - /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -R -f /Applications/Linkquisition.app
      - echo "Installed to /Applications/Linkquisition.app and registered with Launch Services"

  app:dev:
    description: "Builds a macOS .app bundle with a native single-arch binary (required for plugins to load)"
    cmds:
      - rm -rf dist/Linkquisition.app
      - mkdir -p dist/Linkquisition.app/Contents/MacOS
      - mkdir -p dist/Linkquisition.app/Contents/Resources
      - go build -trimpath -tags release -ldflags '-s -w -X main.version={{.VERSION}}' -o dist/Linkquisition.app/Contents/MacOS/linkquisition ./cmd/
      - task build:plugins-darwin
      - sed 's/${VERSION}/{{.VERSION}}/g' package/darwin/Info.plist > dist/Linkquisition.app/Contents/Info.plist
      - sips -s format icns Icon.png --out dist/Linkquisition.app/Contents/Resources/Icon.icns 2>/dev/null || cp Icon.png dist/Linkquisition.app/Contents/Resources/Icon.icns
      - echo "dist/Linkquisition.app created successfully (single-arch, plugin-compatible)"

  app:install-dev:
    description: "Builds a single-arch .app bundle and installs to /Applications (plugins work correctly)"
    cmds:
      - task package:app:dev
      - cp -r dist/Linkquisition.app /Applications/
      - codesign --force --deep --sign - /Applications/Linkquisition.app
      - xattr -cr /Applications/Linkquisition.app
      - /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -R -f /Applications/Linkquisition.app
      - echo "Installed to /Applications/Linkquisition.app and registered with Launch Services"

  appimage:
    description: "Builds an AppImage for Linux (requires linux-amd64 binary and plugins)"
    cmds:
      - task build
      - task build:plugins
      - task package:linux
      - task package:manpages
      - ./scripts/build-appimage.sh
    env:
      VERSION: "{{.VERSION}}"
